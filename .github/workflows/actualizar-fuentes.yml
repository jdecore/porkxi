name: Actualizar fuentes

on:
  schedule:
    - cron: "15 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: actualizar-fuentes
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generar snapshot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generar_estado_fuentes.py

      - name: Commit y push si hay cambios
        run: |
          if git diff --quiet -- public/estado-fuentes.json; then
            echo "Sin cambios en snapshot"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/estado-fuentes.json
          git commit -m "chore(data): actualizar estado de fuentes"
          git push
